name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: '1.3.11'

jobs:
  static:
    name: Lint / typecheck / build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun scripts/check-v8-ignore-count.mjs
      - run: bun run build

  unit:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      # --coverage applies thresholds from vitest.unit.config.ts — fails the
      # job if the ratchet is tripped.
      - run: bun run test:unit -- --coverage --reporter=default --reporter=junit --outputFile=unit-report.xml
      - name: Upload unit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-report
          path: unit-report.xml
          if-no-files-found: ignore

  integration:
    name: Worker integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run test:integration

  e2e:
    name: E2E (playwright chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_SKIP_BUILD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      # Node stays installed alongside Bun so Playwright's test runner
      # (known-flaky under Bun per microsoft/playwright#27139) has a clean
      # subprocess host for its browser workers.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: bun install --frozen-lockfile
      - name: Get Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium
      - name: Install Playwright OS deps (for cached browsers)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium
      - run: bun run build
      - run: bunx playwright test --project=chromium
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  visual:
    name: Visual regression (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Visual tests are opt-in: they require committed linux baselines in
    # tests/e2e/visual-snapshots.spec.ts-snapshots/*-chromium-linux.png. If the
    # baseline is missing, the job is a no-op (exit 0). See README for how
    # to regenerate (needs Linux: use `act`, Codespaces, or a Linux runner).
    continue-on-error: true
    env:
      E2E_SKIP_BUILD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: bun install --frozen-lockfile
      - name: Check if linux baselines exist
        id: baselines
        run: |
          if ls tests/e2e/visual-snapshots.spec.ts-snapshots/*-chromium-linux.png 2>/dev/null; then
            echo "exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "exist=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Playwright
        if: steps.baselines.outputs.exist == 'true'
        run: bunx playwright install --with-deps chromium
      - run: bun run build
        if: steps.baselines.outputs.exist == 'true'
      - run: bunx playwright test --project=visual
        if: steps.baselines.outputs.exist == 'true'
      - name: Upload visual diff report
        if: always() && steps.baselines.outputs.exist == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
